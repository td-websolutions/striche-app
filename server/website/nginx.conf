server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # TLS is terminated by Traefik; keep internal redirects relative so the
    # browser stays on https (avoids a downgrade hop in the Location header).
    absolute_redirect off;

    # Apple App Site Association: must be served as application/json, no extension,
    # over HTTPS (Traefik terminates TLS in front of this container).
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # Invite landing page (Universal Link target + web fallback). /join?code=XXXX
    location /join {
        try_files $uri $uri/ /join/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
